<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZ Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="inventory-container" class="hidden">
        <!-- Sidebar -->
        <nav class="sidebar">
            <ul class="sidebar-menu">
                <li class="sidebar-item active" data-tab="inventory" title="Inventory">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z" />
                        <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2" />
                    </svg>
                </li>
                <li class="sidebar-item" data-tab="profile" title="Profile">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </li>
                <li class="sidebar-item" data-tab="shop" title="Shop">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6z" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <path d="M16 10a4 4 0 01-8 0" />
                    </svg>
                </li>
                <li class="sidebar-item" data-tab="settings" title="Settings">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />
                    </svg>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <div class="breadcrumb">
                        <span class="breadcrumb-parent">Menu</span>
                        <span class="breadcrumb-sep">/</span>
                        <span class="breadcrumb-current">Inventory</span>
                    </div>
                    <div class="page-title">
                        <h1>INVENTORY</h1>
                        <div class="title-underline"></div>
                    </div>
                </div>
                <div class="header-right">
                    <div class="money-display">
                        <span class="money-icon">$</span>
                        <span id="player-money">0</span>
                    </div>
                </div>
            </header>

            <!-- Sections wrapper — flex column, all 3 visible -->
            <div class="sections-wrapper">
                <!-- MY BAG -->
                <section class="inv-section" id="section-bag">
                    <div class="section-header">
                        <span class="section-label">MY BAG</span>
                        <div class="section-weight">
                            <span class="weight-text"><span id="weight-current">0.0</span>KG / <span
                                    id="weight-max">40</span>KG</span>
                            <div class="weight-bar">
                                <div class="weight-bar-fill" id="weight-bar-fill"></div>
                            </div>
                        </div>
                    </div>
                    <div class="item-grid" id="bag-grid"></div>
                </section>

                <!-- PROTECTED CONTAINER -->
                <section class="inv-section" id="section-container">
                    <div class="section-header">
                        <span class="section-label" id="container-label">PROTECTED CONTAINER</span>
                        <div class="section-weight">
                            <span class="weight-text"><span id="container-weight-current">0.0</span>KG / <span
                                    id="container-weight-max">15</span>KG</span>
                        </div>
                    </div>
                    <div class="item-grid" id="container-grid"></div>
                </section>

                <!-- SHOP SECTION -->
                <section class="inv-section hidden" id="section-shop">
                    <div class="section-header">
                        <span class="section-label">GLOBAL MARKETPLACE</span>
                        <div class="shop-controls">
                            <div class="shop-filters">
                                <button class="filter-btn active" data-filter="all">All</button>
                                <button class="filter-btn" data-filter="weapon">Weapons</button>
                                <button class="filter-btn" data-filter="ammo">Ammo</button>
                                <button class="filter-btn" data-filter="medical">Medical</button>
                                <button class="filter-btn" data-filter="other">Other</button>
                                <button class="filter-btn filter-btn--mine" data-filter="mysell">My Sell</button>
                            </div>
                            <div class="search-wrapper">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                </svg>
                                <input type="text" id="shop-search" placeholder="Search for an item...">
                            </div>
                        </div>
                    </div>
                    <div class="item-grid" id="shop-grid"></div>
                </section>

                <!-- PROFILE SECTION -->
                <section class="inv-section hidden" id="section-profile">
                    <div class="section-header">
                        <span class="section-label">PLAYER PROFILE</span>
                    </div>
                    <div class="profile-container">
                        <!-- Stats Column -->
                        <div class="profile-stats">
                            <div class="profile-card">
                                <div class="profile-avatar">
                                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                                        <circle cx="12" cy="7" r="4" />
                                    </svg>
                                </div>
                                <div class="profile-info">
                                    <h2 id="profile-name">Loading...</h2>
                                    <span id="profile-id">ID: 0</span>
                                </div>
                            </div>

                            <div class="stats-grid">
                                <div class="stat-box">
                                    <span class="stat-value" id="stat-kills">0</span>
                                    <span class="stat-label">KILLS</span>
                                </div>
                                <div class="stat-box">
                                    <span class="stat-value" id="stat-deaths">0</span>
                                    <span class="stat-label">DEATHS</span>
                                </div>
                                <div class="stat-box accent">
                                    <span class="stat-value" id="stat-kda">0.00</span>
                                    <span class="stat-label">K/D RATIO</span>
                                </div>
                                <div class="stat-box">
                                    <span class="stat-value" id="stat-assists">0</span>
                                    <span class="stat-label">ASSISTS</span>
                                </div>
                                <div class="stat-box confirm">
                                    <span class="stat-value" id="stat-kill-confirmed">0</span>
                                    <span class="stat-label">KILL CONFIRMED</span>
                                </div>
                            </div>
                        </div>

                        <!-- Leaderboard Column -->
                        <div class="profile-leaderboard">
                            <div class="leaderboard-header">
                                <h3>GLOBAL RANKING</h3>
                            </div>
                            <div class="leaderboard-table-container">
                                <table class="leaderboard-table">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>NAME</th>
                                            <th>KILLS</th>
                                            <th>K/D</th>
                                        </tr>
                                    </thead>
                                    <tbody id="leaderboard-body">
                                        <!-- Rows generated by JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- HOTBAR / SHORTKEYS -->
                <section class="inv-section inv-section--hotbar" id="section-hotbar">
                    <div class="section-header">
                        <span class="section-label">HOTBAR</span>
                    </div>
                    <div class="hotbar-slots" id="shortkeys-slots"></div>
                </section>
            </div>
        </main>
    </div>

    <div id="context-menu" class="context-menu hidden">
        <div class="context-menu-info" id="context-menu-info">
            <div class="ctx-info-name" id="ctx-info-name"></div>
            <div class="ctx-info-desc" id="ctx-info-desc"></div>
            <div class="ctx-info-stats">
                <span id="ctx-info-weight"></span>
                <span id="ctx-info-qty"></span>
            </div>
        </div>
        <div class="ctx-divider"></div>
        <div class="context-menu-item" data-action="use">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12" />
            </svg>
            <span>Use</span>
        </div>
        <div class="context-menu-item" data-action="give">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 1l4 4-4 4" />
                <path d="M3 11V9a4 4 0 014-4h14" />
            </svg>
            <span>Give</span>
        </div>
        <div class="context-menu-item" data-action="drop">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6l-2 14H7L5 6" />
                <path d="M10 11v6" />
                <path d="M14 11v6" />
                <path d="M9 6V4h6v2" />
            </svg>
            <span>Drop</span>
        </div>
        <div class="context-menu-item" data-action="buy" id="ctx-buy-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0" />
            </svg>
            <span>Buy</span>
        </div>
        <div class="context-menu-item" data-action="sell" id="ctx-sell-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" />
            </svg>
            <span>Sell</span>
        </div>
        <div class="context-menu-item context-menu-item--danger" data-action="remove" id="ctx-remove-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
            </svg>
            <span>Remove</span>
        </div>
    </div>

    <!-- Tooltip -->
    <div id="item-tooltip" class="item-tooltip hidden">
        <div class="tooltip-name" id="tooltip-name"></div>
        <div class="tooltip-desc" id="tooltip-desc"></div>
        <div class="tooltip-stats">
            <span id="tooltip-weight"></span>
            <span id="tooltip-qty"></span>
        </div>
    </div>

    <!-- Hidden player info for JS -->
    <span id="player-name" style="display:none">John Doe</span>
    <span id="player-id" style="display:none">42</span>

    <div id="sell-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>Sell Item</h2>
                <button class="modal-close" id="sell-cancel-x">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>Quantity</label>
                    <input type="number" id="sell-qty" min="1" placeholder="1">
                </div>
                <div class="input-group">
                    <label>Unit Price ($)</label>
                    <input type="number" id="sell-price" min="1" placeholder="100">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="sell-cancel-btn">Cancel</button>
                <button class="btn btn-primary" id="sell-confirm-btn">Confirm Sale</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
